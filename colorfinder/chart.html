<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Fund Growth Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <select id="ageSelect" onchange="updateChart()">
    <option value="54">Age 3: 54</option>
    <option value="59">Age 3: 59</option>
    <option value="57">Age 3: 57</option>
    <option value="61">Age 3: 61</option>
    <option value="60">Age 3: 60</option>
    <option value="70">Age 3: 70</option>
    <option value="63">Age 3: 63</option>
    <option value="69">Age 3: 69</option>
    <option value="65">Age 3: 65</option>
    <option value="71">Age 3: 71</option>
    <option value="75">Age 3: 75</option>
    <option value="79">Age 3: 79</option>
  </select>

  <canvas id="retirementChart"></canvas>

  <script>
    const retirementData = {
      54: { ages: [24, 25, 54], balances: [50926, 60429, 990568] },
      59: { ages: [26, 27, 59], balances: [366160937, 9317, 636059] },
      57: { ages: [34, 35, 57], balances: [662179, 249193, 1095481] },
      61: { ages: [44, 45, 59], balances: [678634, 863711, 2057609] },
      60: { ages: [54, 55, 61], balances: [956089, 671044, 802601] },
      70: { ages: [54, 55, 60], balances: [317419, 1053277, 1269233] },
      63: { ages: [54, 55, 57], balances: [29171, 361711, 512640] },
      69: { ages: [57, 58, 70], balances: [1305823, 9856, 10296] },
      65: { ages: [57, 58, 63], balances: [181697, 1406027, 1818936] },
      71: { ages: [62, 63, 69], balances: [688000, 222049, 444445] },
      75: { ages: [62, 63, 65], balances: [1505862, 695002, 822953] },
      79: { ages: [77, 78, 79], balances: [711738, 820777, 1066955] },
    };

    let currentAge = "54";

    const backgroundPlugin = {
      id: 'backgroundPlugin',
      beforeDatasetsDraw: (chart) => {
        const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
        const dataPoints = chart.getDatasetMeta(0).data;

        if (!dataPoints || dataPoints.length < 3) return;

        ctx.save();
        ctx.beginPath();

        // Add $ values for Age2 and Age3
        const age2Index = 1;
        const age3Index = 2;

        ctx.font = '12px Arial';
        ctx.fillStyle = 'black';
        ctx.fillText(`$${chart.data.datasets[0].data[age2Index].toLocaleString()}`, dataPoints[age2Index].x - 15, dataPoints[age2Index].y - 10);
        ctx.fillText(`$${chart.data.datasets[0].data[age3Index].toLocaleString()}`, dataPoints[age3Index].x - 15, dataPoints[age3Index].y - 10);

        ctx.restore();
      }
    };

    const options = {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: 'Retirement Fund Growth Over Time'
        },
        legend: {
          display: false,
        },
        tooltip: {
          enabled: false // Disable tooltips
        },
      },
      layout: {
        padding: {
          left: 0,
          right: 50, // Add extra padding on the right side
          top: 10,
          bottom: 0
        }
      },
      scales: {
        x: {
          type: 'linear',
          position: 'bottom',
          title: {
            display: false, // Remove "Age" label
          },
          ticks: {
            callback: function(value) {
              const age2 = retirementData[currentAge].ages[1];
              const age3 = retirementData[currentAge].ages[2];
              // if (value === age2) {
              //   return  value; // Show Age 2 label
              // }
              return value === value ; // Show Age 3 label
            }
          },
          min: 24,
          max: 54,
        },
        y: {
          display: false, // Remove Y-axis labels
        },
      },
      elements: {
        line: {
          tension: 0.4, // Smoothness applied to the entire line
        },
        point: {
          radius: 5,
        },
      },
    };

    function updateChart() {
      const selectedAge = document.getElementById("ageSelect").value;
      const chartData = retirementData[selectedAge];

      myChart.data.labels = chartData.ages;
      myChart.data.datasets[0].data = chartData.balances;

      // Update x-axis ticks
      const age2 = chartData.ages[1];
      const age3 = chartData.ages[2];
      myChart.options.scales.x.ticks.callback = function(value) {
        if (value === age2) {
          return  value;
        }
        return value === age3 ? value : ''; // Show only Age 3
      };

      // Update x-axis bounds
      myChart.options.scales.x.min = chartData.ages[0];
      myChart.options.scales.x.max = chartData.ages[chartData.ages.length - 1];

      myChart.update();
    }

    const ctx = document.getElementById('retirementChart').getContext('2d');
    const myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: retirementData[currentAge].ages,
        datasets: [{
          label: 'Retirement Fund Balance',
          data: retirementData[currentAge].balances,
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          fill: true,
          tension: 0.4,
          cubicInterpolationMode: 'monotone',
          pointRadius: 5,
        }]
      },
      options: options,
      plugins: [backgroundPlugin],
    });

    myChart.options.scales.x.min = retirementData[currentAge].ages[0];
    myChart.options.scales.x.max = retirementData[currentAge].ages[retirementData[currentAge].ages.length - 1];
    myChart.update();

    updateChart()
  </script>

</body>
</html>

# Publish repo root → https://msrafi.github.io/colormatch/
# Required: Settings → Pages → Source → "GitHub Actions"
name: Deploy Color Finder

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -r scripts styles data _site/
          # Optional: keep /colorfinder/ URL working
          mkdir -p _site/colorfinder
          cp colorfinder/index.html _site/colorfinder/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

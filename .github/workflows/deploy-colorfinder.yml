# Publish site root to GitHub Pages (https://msrafi.github.io/colormatch/)
# Required: Settings → Pages → Source → "GitHub Actions"
name: Deploy Color Finder

on:
  push:
    branches: [master, main]
    paths:
      - "index.html"
      - "scripts/**"
      - "styles/**"
      - "data/**"
      - ".nojekyll"
      - ".github/workflows/deploy-colorfinder.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
